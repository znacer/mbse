# ─── MBSE Explorer — nginx configuration ──────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Gzip compression ────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Vite content-hashed assets (js, css, etc.) ─────────────────────────────
    # Vite fingerprints every asset filename, so these can be cached forever.
    location /assets/ {
        expires       1y;
        add_header    Cache-Control "public, immutable";
        access_log    off;
    }

    # ── Static data files (UAF.xmi, sample JSON) ───────────────────────────────
    # These don't change between deployments but are not fingerprinted, so use
    # a shorter cache with revalidation.
    location ~* \.(xmi|json)$ {
        expires       1d;
        add_header    Cache-Control "public, max-age=86400, must-revalidate";
    }

    # ── Icons / images ─────────────────────────────────────────────────────────
    location ~* \.(svg|png|ico|webp)$ {
        expires       30d;
        add_header    Cache-Control "public, max-age=2592000";
        access_log    off;
    }

    # ── index.html — never cache ────────────────────────────────────────────────
    # The entry-point must always be fresh so users pick up new asset hashes
    # after a deployment.
    location = /index.html {
        expires       -1;
        add_header    Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # ── SPA catch-all ───────────────────────────────────────────────────────────
    # Any path that doesn't match a real file is served as index.html so the
    # client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files (.git, .env, etc.) ───────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
